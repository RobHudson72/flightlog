<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="740" viewBox="-50 -50 1380 740">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#131b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative terminal dots (top left) -->
  <circle cx="80" cy="60" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="105" cy="60" r="7" fill="#eab308" opacity="0.8"/>
  <circle cx="130" cy="60" r="7" fill="#22c55e" opacity="0.8"/>

  <!-- Accent line -->
  <rect x="80" y="85" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="640" y="240" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace" font-size="96" font-weight="700" fill="#ffffff" letter-spacing="-2">
    flightlog
  </text>

  <!-- Tagline -->
  <text x="640" y="310" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="32" fill="#94a3b8" letter-spacing="0.5">
    Total recall for Claude Code
  </text>

  <!-- Feature pills -->
  <g transform="translate(640, 380)" text-anchor="middle">
    <!-- Pill 1 -->
    <rect x="-390" y="-18" width="170" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-305" y="6" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#3b82f6">search history</text>

    <!-- Pill 2 -->
    <rect x="-195" y="-18" width="180" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="-105" y="6" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#8b5cf6">agent visibility</text>

    <!-- Pill 3 -->
    <rect x="10" y="-18" width="160" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="6" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#22c55e">28ms queries</text>

    <!-- Pill 4 -->
    <rect x="195" y="-18" width="190" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="290" y="6" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="14" fill="#eab308">multi-agent MCP</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1280" height="40" fill="#0f172a"/>
  <text x="80" y="626" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#64748b">
    github.com/RobHudson72/flightlog
  </text>
  <text x="1200" y="626" text-anchor="end" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#64748b">
    Fermi Ventures
  </text>
</svg>
